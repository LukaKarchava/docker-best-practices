
services:
  # 1. Our Brain (The Python Backend)
  backend_app:
    build: ./backend
    container_name: python_app
    networks:
      - devops_bridge
    environment:
      - MENTOR_MODE=active

  # 2. Our Guard (The Nginx Proxy)
  traffic_cop_proxy:
    build: .
    container_name: traffic_cop
    ports:
      - "80:80"
    networks:
      - devops_bridge
    depends_on:
      - backend_app

  database_postgres:
    image: postgres:15-alpine
    container_name: database_notebook
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - devops_bridge
    volumes:
      - ./db_data:/var/lib/postgresql/data

networks:
  # 3. Our Virtual Highway Infrastructure
  devops_bridge:
    driver: bridge



